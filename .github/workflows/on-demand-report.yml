name: On-Demand Report Generation

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Type of report to generate'
        required: true
        type: choice
        options:
          - weekly
          - daily
          - export

permissions:
  contents: read
  security-events: read

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download security history
        if: inputs.report_type == 'weekly'
        uses: actions/download-artifact@v4
        with:
          name: security-history
          path: data/history
        continue-on-error: true
      
      - name: Generate Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ${{ github.repository_owner }}
        run: |
          python main.py ${{ inputs.report_type }}
      
      - name: Upload Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ inputs.report_type }}-${{ github.run_number }}
          path: data/reports/*
          retention-days: 30