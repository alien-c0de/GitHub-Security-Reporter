name: Weekly Security Report

on:
  schedule:
    # Every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  security-events: read

jobs:
  generate-weekly-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download security history
        uses: actions/download-artifact@v4
        with:
          name: security-history
          path: data/history
        continue-on-error: true
      
      - name: Generate Weekly Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ${{ github.repository_owner }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python main.py weekly
      
      - name: Upload security history
        uses: actions/upload-artifact@v4
        with:
          name: security-history
          path: data/history/security_history.json
          retention-days: 365
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-report-${{ github.run_number }}
          path: data/reports/*.xlsx
          retention-days: 90
      
      - name: Send Email Notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: GitHub Security Weekly Report - Week ${{ github.run_number }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            Weekly GitHub Advanced Security Report
            
            This automated report was generated on ${{ github.event.repository.updated_at }}
            
            Please find the attached Excel report with comprehensive security metrics.
            
            Report ID: ${{ github.run_number }}
            Organization: ${{ github.repository_owner }}
            
            Best regards,
            GitHub Security Automation
          attachments: data/reports/*.xlsx